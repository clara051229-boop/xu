<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徐老师的备考站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部时间显示 -->
        <div class="time-display">
            <h2 id="current-time"></h2>
        </div>

        <!-- 欢迎语 -->
        <div class="welcome-section">
            <h1 class="welcome-text">嗨亲爱的徐老师，今天也辛苦啦～ 我们慢慢来。</h1>
        </div>

        <!-- 每日一句 -->
        <div class="card">
            <h3 class="card-title">每日一句 · 暖心话</h3>
            <div id="daily-quote" class="quote-text"></div>
            <button id="change-quote" class="btn btn-outline">换一句</button>
        </div>

        <!-- 正向计时器 -->
        <div class="card">
            <h3 class="card-title">今日陪伴时长</h3>
            <div id="timer-display" class="timer-text">00:00:00</div>
            <div class="timer-controls">
                <button id="start-timer" class="btn btn-success">开始</button>
                <button id="pause-timer" class="btn btn-warning">暂停</button>
                <button id="reset-timer" class="btn btn-danger">重置</button>
            </div>
            <button id="complete-section" class="btn btn-primary">完成一小节</button>
        </div>

        <!-- 放松小憩 -->
        <div class="card">
            <h3 class="card-title">放松小憩 · 白噪音/音乐</h3>
            <div class="music-grid">
                <div class="music-item">
                    <h5>雨声</h5>
                    <audio controls loop>
                        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=rain-and-thunder-112166.mp3" type="audio/mpeg">
                        您的浏览器不支持音频播放。
                    </audio>
                </div>
                <div class="music-item">
                    <h5>咖啡店</h5>
                    <audio controls loop>
                        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=coffee-shop-ambience-6993.mp3" type="audio/mpeg">
                        您的浏览器不支持音频播放。
                    </audio>
                </div>
                <div class="music-item">
                    <h5>森林</h5>
                    <audio controls loop>
                        <source src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_241115c835.mp3?filename=forest-wind-and-birds-6881.mp3" type="audio/mpeg">
                        您的浏览器不支持音频播放。
                    </audio>
                </div>
            </div>
        </div>

        <!-- 里程碑 -->
        <div class="card">
            <h3 class="card-title">里程碑</h3>
            <div class="milestone-grid">
                <div class="milestone-item">
                    <h5>连续陪伴天数</h5>
                    <p id="streak-days" class="milestone-number">0</p>
                </div>
                <div class="milestone-item">
                    <h5>累计专注总时长</h5>
                    <p id="total-time" class="milestone-number">0小时</p>
                </div>
                <div class="milestone-item">
                    <h5>今日已完成小任务</h5>
                    <p id="completed-tasks" class="milestone-number">0</p>
                </div>
            </div>
        </div>

        <!-- 今日小任务 -->
        <div class="card">
            <h3 class="card-title">今日小任务</h3>
            <div class="task-item">
                <input type="checkbox" id="task-1" class="task-checkbox">
                <label for="task-1" class="task-label">记得喝四杯水呢这位老师</label>
            </div>
        </div>

        <!-- 留言墙 -->
        <div class="card">
            <h3 class="card-title">留言墙 / 悄悄话</h3>
            <textarea id="message-input" class="message-input" placeholder="写下你的心情，或者想对我说的话..."></textarea>
            <button id="save-message" class="btn btn-primary">保存留言</button>
            <div id="message-wall" class="message-wall"></div>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>徐老师的备考站 | 陪伴你走过每一个备考的日子</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
